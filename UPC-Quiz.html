<!DOCTYPE html>
<html>
  <head>
    <title>UPC Exams Portal</title>
    <meta name="description" content="UPC Exams Portal">
    <style>
      :root {
        --primary-color: #4a6bff;
        --secondary-color: #f8f9fa;
        --accent-color: #030303;
        --text-color: #333;
        --light-text: #6c757d;
        --border-radius: 8px;
        --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --warning-color: #ff9800;
        --danger-color: #f44336;
        --success-color: #4caf50;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background-color: #f5f7ff;
        padding: 20px;
        max-width: 900px;
        margin: 0 auto;
      }

      h2 { color: var(--primary-color); text-align: center; margin-bottom: 1.5rem; font-size: 2rem; }
      h3 { color: var(--warning-color); text-align: center; margin-bottom: 1rem; font-size: 1.5rem; }

      .card {
        background: white;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        padding: 2rem;
        margin-bottom: 1.5rem;
        position: relative;
      }

      input[type="text"], input[type="email"], select {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 1rem;
        border: 1px solid #ddd;
        border-radius: var(--border-radius);
        font-size: 1rem;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus, input[type="email"]:focus, select:focus {
        border-color: var(--primary-color);
        outline: none;
        box-shadow: 0 0 0 3px rgba(74, 107, 255, 0.2);
      }

      button {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: var(--border-radius);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        width: 100%;
        transition: background-color 0.3s, transform 0.2s;
      }

      button:hover { background-color: #3a5bef; transform: translateY(-2px); }
      button:active { transform: translateY(0); }

      .button-group { display: flex; gap: 10px; margin-top: 1rem; }
      .button-group button { flex: 1; }
      .btn-warning { background-color: var(--warning-color); }
      .btn-warning:hover { background-color: #e68900; }
      .btn-danger { background-color: var(--danger-color); }
      .btn-danger:hover { background-color: #d32f2f; }
      .btn-success { background-color: var(--success-color); }
      .btn-success:hover { background-color: #3d8b40; }
      .hidden { display: none !important; }

      #timerDisplay {
        text-align: center;
        font-size: 1.2rem;
        margin-bottom: 1.5rem;
        padding: 10px;
        background-color: #fff8f8;
        border-radius: var(--border-radius);
        color: var(--accent-color);
        font-weight: bold;
        border: 1px solid #ffdddd;
      }

      .question-block {
        margin-bottom: 1.5rem;
        padding: 1.5rem;
        background-color: var(--secondary-color);
        border-radius: var(--border-radius);
        position: relative;
      }

      .question-block.unanswered {
        border-left: 4px solid var(--warning-color);
        background-color: #fff8e1;
      }

      .question-block p { font-weight: 600; margin-bottom: 1rem; font-size: 1.1rem; }

      .question-image {
        max-width: 100%;
        max-height: 300px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
        display: block;
      }

      .option-container { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
      .option-content { flex: 1; display: flex; flex-direction: column; gap: 5px; }

      .option-image {
        max-width: 150px;
        max-height: 100px;
        border-radius: 6px;
        border: 1px solid #ddd;
        display: block;
      }

      label {
        display: block;
        padding: 12px 15px;
        margin-bottom: 8px;
        background: white;
        border-radius: var(--border-radius);
        cursor: pointer;
        transition: background-color 0.2s;
        border: 1px solid #eee;
      }

      label:hover { background-color: #f0f4ff; border-color: var(--primary-color); }
      input[type="radio"]:checked + label { background-color: #e8f4ff; border-color: var(--primary-color); }
      input[type="radio"] { display: none; }
      .option-with-image { display: flex; flex-direction: column; gap: 8px; }
      .option-text { font-weight: 500; }

      #scoreMsg {
        text-align: center;
        font-size: 1.2rem;
        padding: 15px;
        background-color: #e8f5e9;
        border-radius: var(--border-radius);
        color: #2e7d32;
        margin-top: 1rem;
        font-weight: 600;
      }

      #loading {
        text-align: center;
        font-size: 1.2rem;
        padding: 15px;
        background-color: #fff3cd;
        border-radius: var(--border-radius);
        color: #664d03;
        margin-top: 1rem;
        font-weight: 600;
      }

      .loader {
        width: 15px;
        height: 15px;
        border: 3px solid #664d03;
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      .form-header { text-align: center; margin-bottom: 1.5rem; }
      .form-header p { color: var(--light-text); margin-top: 0.5rem; }

      .error-message {
        background-color: #fde8e8;
        color: #c53030;
        padding: 12px;
        border-radius: var(--border-radius);
        margin-bottom: 1rem;
        text-align: center;
        font-weight: 600;
        border: 1px solid #fbb6b6;
      }

      .progress-info {
        background-color: #e8f4ff;
        padding: 12px;
        border-radius: var(--border-radius);
        margin-bottom: 1.5rem;
        text-align: center;
        font-weight: 600;
        color: var(--primary-color);
        border: 1px solid #cce5ff;
      }

      .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal {
        background: white;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        padding: 2rem;
        max-width: 500px;
        width: 100%;
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .modal-content { text-align: center; }
      .modal-icon { font-size: 3rem; color: var(--warning-color); margin-bottom: 1rem; }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
      }

      @media (max-width: 600px) {
        body { padding: 15px; }
        .card { padding: 1.5rem; }
        h2 { font-size: 1.5rem; }
        .button-group { flex-direction: column; }
        .question-image { max-height: 200px; }
        .option-image { max-width: 120px; max-height: 80px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="form-header">
        <h2>UPC Exams Portal</h2>
        <p id="paragraph">Test your knowledge</p>
      </div>

      <div id="errorMessage" class="hidden error-message"></div>

      <form id="EmailForm">
        <input type="text" name="name" placeholder="الاسم بالكامل" required />
        <input type="email" name="email" placeholder="ايميل المتحدة الرسمى" required />
        <input type="text" name="mobile" placeholder="رقم الهاتف المحمول" required />
        <select name="title" id="titleSelect" required>
          <option value="">Loading titles...</option>
        </select>
        <button type="submit">Start Quiz</button>
      </form>

      <form id="quizForm" class="hidden">
        <p id="timerDisplay"></p>

        <div id="progressInfo" class="hidden progress-info">
          <span id="answeredCount">0</span> of <span id="totalQuestions">0</span> questions answered
        </div>

        <div id="quizContainer"></div>

        <div class="button-group">
          <button type="button" id="reviewBtn" class="btn-warning">Review Unanswered Questions</button>
          <button type="submit" id="submitBtn">Submit Answers</button>
        </div>
      </form>

      <p id="scoreMsg"></p>
      <p id="loading" class="hidden">
        <span class="loader"></span>Submitting your answers...
      </p>
    </div>

    <div id="confirmationModal" class="hidden modal-overlay">
      <div class="modal">
        <div class="modal-content">
          <div class="modal-icon">⚠️</div>
          <h3>Incomplete Quiz</h3>
          <p id="unansweredCountText">You have not answered some questions.</p>
          <p><strong>Are you sure you want to submit?</strong></p>
          <div class="button-group" style="margin-top: 2rem;">
            <button type="button" id="cancelSubmitBtn" class="btn-warning">Go Back & Answer</button>
            <button type="button" id="confirmSubmitBtn" class="btn-danger">Submit Anyway</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const TITLES_SHEET_URL     = "https://opensheet.elk.sh/1zq1ei3A6LcuUPp77WLl8hiP2MCdTHfbV2ScMF2cvzu0/Titles";
      const QUIZ_QUESTIONS_URL   = "https://opensheet.elk.sh/1zq1ei3A6LcuUPp77WLl8hiP2MCdTHfbV2ScMF2cvzu0/";
      const WAVES_BASE_URL       = "https://opensheet.elk.sh/1BfUO480KG_5RtpmPqi-NzIVi6rYlBqOcT15WTlcSNlc/";
      const SUBMISSION_ENDPOINT  = "https://script.google.com/macros/s/AKfycbye-lW5yVVimXgJyCfJ-GQcAv-r55XkdHpl7Gm_E81Pb1wPZV_eYMSWgeEklbNt_Om1/exec";

      /*
       * DATA MODEL
       *
       * originalQuestions  — valid questions in ORIGINAL spreadsheet order (index = sheet position)
       *
       * displayQuestions   — shuffled copy shown to the user; each entry carries:
       *   .originalIndex      → position in originalQuestions (used to store answer in correct slot)
       *   .originalId         → ID value from the spreadsheet row
       *   .originalCorrectLetter → correct answer letter as it appears in the spreadsheet (A/B/C/D)
       *   .displayedOptions   → array of { displayLetter, originalLetter, text, image }
       *                          after options have been shuffled
       *   (all other .Question / .Question_image / .Timer fields preserved)
       *
       * When scoring:
       *   user picks a displayLetter  →  map to originalLetter via displayedOptions
       *   correct if originalLetter === originalCorrectLetter
       */

      let originalQuestions  = [];
      let displayQuestions   = [];
      let timerMinutes       = 50;
      let quizStartTime;
      let currentTitleData   = null;
      let unansweredIndices  = [];   // display-order indices of unanswered questions

      // ─── Utilities ────────────────────────────────────────────────────────────

      function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function convertToDirectImageUrl(url) {
        if (!url || typeof url !== "string") return "";
        url = url.replace(/_+/g, "").trim();
        const match = url.match(/[-\w]{25,}/);
        if (!match) return "";
        return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w1200`;
      }

      function showError(msg) {
        const el = document.getElementById("errorMessage");
        el.textContent = msg;
        el.classList.remove("hidden");
        setTimeout(() => el.classList.add("hidden"), 5000);
      }

      // ─── Titles ───────────────────────────────────────────────────────────────

      async function loadTitles() {
        try {
          const res  = await fetch(TITLES_SHEET_URL);
          const data = await res.json();
          const sel  = document.getElementById("titleSelect");

          sel.innerHTML = '<option value="">Select Title</option>';

          data
            .filter(r => r.Status && r.Status.toLowerCase() === "active")
            .forEach(r => {
              const opt = document.createElement("option");
              opt.value = r.Title;
              opt.textContent = r.Title;
              opt.dataset.wave = r.Wave || "All";
              sel.appendChild(opt);
            });
        } catch (err) {
          console.error("loadTitles error:", err);
          document.getElementById("titleSelect").innerHTML =
            '<option value="">Failed to load titles</option>';
        }
      }

      // ─── Wave access ──────────────────────────────────────────────────────────

      async function checkWaveAccess(email, wave) {
        if (!wave || wave.trim().toLowerCase() === "all") return true;

        try {
          const waves = wave.split(',').map(w => w.trim());

          for (const waveName of waves) {
            const res = await fetch(`${WAVES_BASE_URL}${waveName}`);
            if (!res.ok) continue;

            const waveData = await res.json();
            const found = waveData.some(row =>
              Object.values(row).some(v =>
                v && v.toString().toLowerCase() === email.toLowerCase()
              )
            );
            if (found) return true;
          }
          return false;
        } catch (err) {
          console.error("checkWaveAccess error:", err);
          return false;
        }
      }

      // ─── Question preparation ─────────────────────────────────────────────────

      function filterValidQuestions(raw) {
        return raw.filter(q => {
          if (!q.Question || q.Question.trim().length < 3) return false;
          const opts = [q.OptionA, q.OptionB, q.OptionC, q.OptionD]
            .filter(o => o && o.trim() !== '' && o.trim() !== '.');
          return opts.length >= 2;
        });
      }

      /**
       * Build displayQuestions from originalQuestions.
       * Each display question stores everything needed to:
       *   1. Render the UI (shuffled options with display letters A/B/C/D)
       *   2. Score correctly (map display letter → original letter → compare to originalCorrectLetter)
       *   3. Store the answer in the original sheet order (originalIndex)
       */
      function buildDisplayQuestions(originals) {
        // Shuffle the order in which questions appear
        const shuffledOriginals = shuffleArray(originals.map((q, idx) => ({ ...q, _origIdx: idx })));

        return shuffledOriginals.map(q => {
          const origIdx = q._origIdx;

          // Build the pool of valid options, each tagged with its original letter
          const optionPool = ['A', 'B', 'C', 'D']
            .map(letter => ({
              originalLetter: letter,
              text:  q[`Option${letter}`]       || '',
              image: q[`Option${letter}_image`] || ''
            }))
            .filter(o => o.text.trim() !== '' && o.text.trim() !== '.');

          // Shuffle options
          const shuffledOptions = shuffleArray(optionPool);

          // Assign display letters A, B, C, D to the shuffled options
          const displayedOptions = shuffledOptions.map((opt, pos) => ({
            ...opt,
            displayLetter: String.fromCharCode(65 + pos)   // A, B, C, D
          }));

          // Find which display letter corresponds to the correct original letter
          const correctDisplay = displayedOptions.find(
            o => o.originalLetter === q.CorrectAnswer
          );

          return {
            // For rendering
            Question:       q.Question,
            Question_image: q.Question_image || '',
            displayedOptions,                               // [ {displayLetter, originalLetter, text, image} ]

            // For scoring
            originalIndex:        origIdx,
            originalId:           q.ID || '',
            originalCorrectLetter: q.CorrectAnswer,        // e.g. "B"
            displayCorrectLetter:  correctDisplay ? correctDisplay.displayLetter : '', // e.g. "C"

            // Timer (from first question)
            Timer: q.Timer
          };
        });
      }

      // ─── Load & render questions ───────────────────────────────────────────────

      async function loadQuestions(title) {
        try {
          const res = await fetch(`${QUIZ_QUESTIONS_URL}${title}`);
          const raw = await res.json();

          if (!raw || raw.length === 0) throw new Error("No questions found");

          timerMinutes = parseInt(raw[0].Timer) || 50;

          originalQuestions = filterValidQuestions(raw);
          if (originalQuestions.length === 0) throw new Error("No valid questions");

          displayQuestions = buildDisplayQuestions(originalQuestions);

          renderQuestions();
          startTimer(timerMinutes);
          quizStartTime = Date.now();
          setTimeout(checkAnsweredQuestions, 100);

        } catch (err) {
          console.error("loadQuestions error:", err);
          showError("Failed to load quiz questions. Please try again.");
        }
      }

      function renderQuestions() {
        const container = document.getElementById("quizContainer");
        container.innerHTML = "";

        displayQuestions.forEach((q, i) => {
          const questionImageHtml = q.Question_image
            ? `<img src="${convertToDirectImageUrl(q.Question_image)}" class="question-image" alt="Question image" onerror="this.style.display='none'">`
            : '';

          const optsHTML = q.displayedOptions.map(opt => {
            const imageHtml = opt.image
              ? `<img src="${convertToDirectImageUrl(opt.image)}" class="option-image" alt="Option image" onerror="this.style.display='none'">`
              : '';

            return `
              <div class="option-container">
                <input type="radio" id="q${i}_${opt.displayLetter}" name="q${i}" value="${opt.displayLetter}">
                <label for="q${i}_${opt.displayLetter}" class="option-with-image">
                  <span class="option-text">${opt.text}</span>
                  ${imageHtml}
                </label>
              </div>
            `;
          }).join('');

          container.innerHTML += `
            <div class="question-block" data-display-index="${i}">
              <p>${i + 1}. ${q.Question}</p>
              ${questionImageHtml}
              ${optsHTML}
            </div>
          `;
        });

        // Update progress on any answer change
        container.querySelectorAll('input[type="radio"]').forEach(radio => {
          radio.addEventListener('change', checkAnsweredQuestions);
        });
      }

      // ─── Progress tracking ────────────────────────────────────────────────────

      function checkAnsweredQuestions() {
        const form = document.getElementById("quizForm");
        unansweredIndices = [];

        displayQuestions.forEach((_, i) => {
          const block    = document.querySelector(`.question-block[data-display-index="${i}"]`);
          const answered = form.querySelector(`input[name="q${i}"]:checked`);
          if (!answered) {
            unansweredIndices.push(i);
            block && block.classList.add("unanswered");
          } else {
            block && block.classList.remove("unanswered");
          }
        });

        const total    = displayQuestions.length;
        const answered = total - unansweredIndices.length;

        document.getElementById("answeredCount").textContent  = answered;
        document.getElementById("totalQuestions").textContent = total;

        const progressInfo = document.getElementById("progressInfo");
        if (total > 0) progressInfo.classList.remove("hidden");

        return { answered, total };
      }

      function scrollToFirstUnanswered() {
        if (unansweredIndices.length === 0) return;
        const first = document.querySelector(
          `.question-block[data-display-index="${unansweredIndices[0]}"]`
        );
        if (first) {
          first.scrollIntoView({ behavior: 'smooth', block: 'center' });
          first.style.animation = 'pulse 1s';
          setTimeout(() => { first.style.animation = ''; }, 1100);
        }
      }

      // ─── Submission ───────────────────────────────────────────────────────────

      async function submitQuiz() {
        clearInterval(window.timerInterval);

        const emailForm = document.getElementById("EmailForm");
        const name      = emailForm.querySelector('[name="name"]').value;
        const email     = emailForm.querySelector('[name="email"]').value;
        const mobile    = emailForm.querySelector('[name="mobile"]').value;
        const title     = currentTitleData?.title || "";

        const form = document.getElementById("quizForm");

        // Initialise answers array in ORIGINAL spreadsheet order
        const answersInOriginalOrder = new Array(originalQuestions.length).fill(0);
        let   score          = 0;
        const wrongAnswerIds = [];

        displayQuestions.forEach((q, displayIdx) => {
          const selected = form.querySelector(`input[name="q${displayIdx}"]:checked`);
          const origIdx  = q.originalIndex;

          if (selected) {
            const displayLetter = selected.value;   // What user picked (A/B/C/D as displayed)

            // Convert display letter → original letter
            const pickedOption = q.displayedOptions.find(o => o.displayLetter === displayLetter);
            const originalLetter = pickedOption ? pickedOption.originalLetter : displayLetter;

            // Store in original order slot
            answersInOriginalOrder[origIdx] = originalLetter;

            // ── THE FIX: compare original letters, not display letters ──
            const isCorrect = originalLetter === q.originalCorrectLetter;

            if (isCorrect) {
              score++;
            } else {
              if (q.originalId) wrongAnswerIds.push(q.originalId);
            }
          } else {
            // Unanswered — slot stays 0, counts as wrong
            answersInOriginalOrder[origIdx] = 0;
            if (q.originalId) wrongAnswerIds.push(q.originalId);
          }
        });

        document.getElementById("loading").classList.remove("hidden");

        const timetakenSeconds = Math.floor((Date.now() - quizStartTime) / 1000);

        console.log("Submitting:", {
          originalQuestions: originalQuestions.length,
          answers: answersInOriginalOrder,
          score,
          wrongAnswerIds
        });

        try {
          const res = await fetch(SUBMISSION_ENDPOINT, {
            method: "POST",
            body: JSON.stringify({
              type:             "submitQuiz",
              name,
              email,
              answers:          answersInOriginalOrder,
              score,
              title,
              timeofsubmission: new Date().toISOString(),
              timetaken:        timetakenSeconds,
              mobile,
              wrongAnswers:     wrongAnswerIds
                .sort((a, b) => Number(a) - Number(b))
                .join(',')
            }),
          });

          const result = await res.json();
          document.getElementById("loading").classList.add("hidden");

          if (result.status === "success") {
            document.getElementById("scoreMsg").textContent = "Your answers have been recorded!";
            document.getElementById("quizForm").classList.add("hidden");
            document.getElementById("paragraph").textContent = "Form was submitted successfully!";
          } else {
            showError("Failed to submit answers. Please try again.");
          }
        } catch (err) {
          console.error("submitQuiz error:", err);
          showError("Failed to submit answers. Please try again.");
          document.getElementById("loading").classList.add("hidden");
        }
      }

      // ─── Modal helpers ────────────────────────────────────────────────────────

      function showConfirmationModal(unansweredCount) {
        const text = unansweredCount === 1
          ? "You have 1 unanswered question."
          : `You have ${unansweredCount} unanswered questions.`;
        document.getElementById("unansweredCountText").textContent = text;
        document.getElementById("confirmationModal").classList.remove("hidden");
        document.body.style.overflow = 'hidden';
      }

      function hideConfirmationModal() {
        document.getElementById("confirmationModal").classList.add("hidden");
        document.body.style.overflow = 'auto';
      }

      // ─── Timer ────────────────────────────────────────────────────────────────

      function startTimer(minutes) {
        let seconds = minutes * 60;
        const display = document.getElementById("timerDisplay");

        window.timerInterval = setInterval(() => {
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          display.textContent = `Time Remaining: ${m}:${s.toString().padStart(2, "0")}`;

          if (seconds <= 0) {
            clearInterval(window.timerInterval);
            showError("Time's up! Your quiz is being submitted.");
            submitQuiz();
          }
          seconds--;
        }, 1000);
      }

      // ─── Event listeners ──────────────────────────────────────────────────────

      document.getElementById("EmailForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form  = e.target;
        const name  = form.name.value.trim();
        const email = form.email.value.trim();
        const title = form.title.value;
        const wave  = form.title.selectedOptions[0]?.dataset.wave || "All";

        currentTitleData = { title, wave };

        const hasAccess = await checkWaveAccess(email, wave);
        if (!hasAccess) {
          showError("Access denied. You are not authorized to take this quiz.");
          return;
        }

        document.getElementById("EmailForm").classList.add("hidden");
        document.getElementById("quizForm").classList.remove("hidden");
        await loadQuestions(title);
      });

      document.getElementById("submitBtn").addEventListener("click", (e) => {
        e.preventDefault();
        const { answered, total } = checkAnsweredQuestions();
        const unanswered = total - answered;
        if (unanswered > 0) {
          showConfirmationModal(unanswered);
        } else {
          submitQuiz();
        }
      });

      document.getElementById("reviewBtn").addEventListener("click", () => {
        checkAnsweredQuestions();
        if (unansweredIndices.length > 0) {
          scrollToFirstUnanswered();
        } else {
          showError("All questions have been answered!");
        }
      });

      document.getElementById("cancelSubmitBtn").addEventListener("click", () => {
        hideConfirmationModal();
        scrollToFirstUnanswered();
      });

      document.getElementById("confirmSubmitBtn").addEventListener("click", () => {
        hideConfirmationModal();
        submitQuiz();
      });

      document.addEventListener('contextmenu', e => e.preventDefault());

      document.addEventListener("DOMContentLoaded", loadTitles);
    </script>
  </body>
</html>
